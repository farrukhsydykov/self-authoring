services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: selfauthoring
      POSTGRES_PASSWORD: selfauthoring
      POSTGRES_DB: selfauthoring
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selfauthoring -d selfauthoring"]
      interval: 2s
      timeout: 5s
      retries: 15

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://selfauthoring:selfauthoring@postgres:5432/selfauthoring
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
